<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>TodayCard</title>
  <link rel="icon" type="image/svg+xml" href="./assets/todaycard.svg">
  <link rel="stylesheet" href="./styles.css?v=20260624-iosalign">
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="brand">
        <h1>TodayCard</h1>
      </div>
    </header>

    <section class="stage" aria-label="TodayCard deck">
      <div class="deck-shell" id="deckShell" tabindex="0" aria-label="Draggable TodayCard deck">
        <div class="deck" id="deck"></div>
        <div class="empty" id="emptyState" data-i18n="emptyState" hidden>No cards</div>
      </div>
    </section>

    <section class="control-panel" aria-label="TodayCard controls">
      <div class="field">
        <div class="decision-row">
          <input id="decisionInput" autocomplete="off" placeholder="今天想决定什么？" maxlength="96" aria-label="今天想决定什么？">
          <button id="buildButton" class="draw-button" type="button" aria-label="抽卡" data-i18n-aria-label="drawButton">
            <span class="button-text" data-i18n="drawButton">抽卡</span>
          </button>
        </div>
      </div>
    </section>

    <footer class="source-footer" aria-label="TodayCard source">
      <a class="source-link" href="https://github.com/hiyeshu/todaycard" target="_blank" rel="noreferrer">@hiyeshu/todaycard</a>
    </footer>
  </main>

  <script src="./data.js?v=20260624-saturated"></script>
  <script src="./audio.js?v=20260624-shift"></script>
  <script src="./app.js?v=20260624-shift"></script>
</body>
</html>
