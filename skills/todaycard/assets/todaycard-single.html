:root {
  --page: #ffffff;
  --ink: #252525;
  --muted: #8e8e8e;
  --quiet: #c7c7c7;
  --line: #e9e9e9;
  --soft: #f8f8f8;
  --shadow: 0 18px 42px rgba(30, 30, 30, 0.08);
  --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
[hidden] { display: none !important; }

html,
body {
  margin: 0;
  min-height: 100%;
  background:
    radial-gradient(circle at 18% 4%, rgba(64, 114, 255, 0.08), transparent 22%),
    radial-gradient(circle at 77% 0%, rgba(95, 213, 0, 0.08), transparent 22%),
    radial-gradient(circle at 97% 4%, rgba(255, 101, 72, 0.08), transparent 20%),
    var(--page);
  color: var(--ink);
  font-family: var(--sans);
}

body {
  min-height: 100vh;
  padding: 32px 0 34px;
  overflow-x: hidden;
}

button,
input {
  font: inherit;
}

button {
  min-height: 36px;
  border: 1px solid #171717;
  border-radius: 14px;
  background: #171717;
  color: #fafafa;
  padding: 10px 18px;
  font-size: 14px;
  font-weight: 520;
  letter-spacing: 0;
  cursor: pointer;
  transition: transform 160ms ease, opacity 160ms ease, background 160ms ease;
}

button:hover { transform: translateY(-1px); }
button:active { transform: translateY(0); }

button:focus-visible,
input:focus-visible {
  outline: 0;
  box-shadow:
    0 0 0 1px rgba(23, 23, 23, 0.16),
    0 0 0 4px rgba(23, 23, 23, 0.06);
}

.deck-shell:focus-visible {
  outline: 0;
}

button.secondary,
button.ghost {
  border-color: #e5e5e5;
  background: #fff;
  color: #0a0a0a;
}

button.ghost {
  width: 36px;
  min-width: 36px;
  padding: 0;
  display: inline-grid;
  place-items: center;
  border-radius: 50%;
}

.app {
  width: min(calc(100vw - 40px), 430px);
  margin: 0 auto;
  display: grid;
  gap: 24px;
}

.hero {
  display: grid;
  justify-items: center;
}

.brand {
  display: grid;
  justify-items: center;
}

.brand h1 {
  margin: 0;
  font-size: 24px;
  font-weight: 780;
  line-height: 1;
  letter-spacing: 0;
}

.stage {
  display: grid;
  gap: 0;
}

.deck-shell {
  position: relative;
  height: 372px;
  width: 100%;
  margin-inline: 0;
  perspective: 900px;
  -webkit-perspective: 900px;
  touch-action: pan-y;
  user-select: none;
  cursor: grab;
  overflow: visible;
}

.deck-shell.is-dragging { cursor: grabbing; }
.deck-shell.is-dealing { cursor: wait; }
.deck-shell.is-dealing .card { pointer-events: none; }

.deck {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
}

.card {
  --card-bg: #fff;
  --card-cell: #f2f2f2;
  --card-mark: #00c9a7;
  --card-text: #666;
  --card-muted: #a4a4a4;
  --card-frame: #00c9a7;
  --lift: 0px;
  position: absolute;
  width: min(240px, 62vw);
  aspect-ratio: 0.76;
  color: var(--card-text);
  opacity: var(--opacity);
  pointer-events: auto;
  cursor: pointer;
  transform: translateY(calc(var(--card-y, -20px) + var(--lift))) translateX(var(--x)) translateZ(var(--z)) rotateY(var(--ry)) rotateZ(var(--rz)) scale(var(--scale));
  transform-origin: center;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  transition: transform 450ms cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 450ms cubic-bezier(0.25, 0.46, 0.45, 0.94);
  will-change: transform, opacity;
}

.deck-shell.is-dragging .card {
  transition: none;
}

@media (hover: hover) and (pointer: fine) {
  .card:hover {
    --lift: -8px;
  }
}

.deal-motion {
  position: absolute;
  inset: 0;
  opacity: 1;
  transform: translate3d(0, 0, 0);
  transform-origin: center;
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  will-change: transform, opacity;
}

.card.is-dealing .deal-motion {
  animation: deal-card 520ms cubic-bezier(0.18, 0.82, 0.2, 1) both;
  animation-delay: var(--deal-delay, 0ms);
}

@keyframes deal-card {
  0% {
    opacity: 0;
    transform: translate3d(0, -58px, 96px) rotateZ(-5deg) scale(0.82);
  }

  64% {
    opacity: 1;
  }

  100% {
    opacity: 1;
    transform: translate3d(0, 0, 0) rotateZ(0) scale(1);
  }
}

.card-inner {
  position: absolute;
  inset: 0;
  border: 10px solid color-mix(in srgb, var(--card-frame), #fff 6%);
  border-radius: 28px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.08)),
    var(--card-frame);
  box-shadow:
    0 22px 32px rgba(31, 31, 31, 0.1),
    0 8px 14px rgba(31, 31, 31, 0.08);
  transform-style: preserve-3d;
  transform-origin: center;
  transition: transform 560ms cubic-bezier(0.2, 0.78, 0.12, 1);
  transform: translateZ(0);
  will-change: transform;
  -webkit-transform-style: preserve-3d;
  -webkit-transform: translateZ(0);
}

.card-inner::before {
  content: "";
  position: absolute;
  inset: -10px;
  z-index: 4;
  pointer-events: none;
  border-radius: 31px;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.58),
    inset 0 -14px 24px rgba(0, 0, 0, 0.08),
    0 1px 0 rgba(255, 255, 255, 0.9);
}

.card.is-flipped .card-inner {
  transform: translateZ(0) rotateY(180deg);
  -webkit-transform: translateZ(0) rotateY(180deg);
}

.stamp-face {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
  gap: 12px;
  padding: 18px;
  border-radius: 20px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(250, 250, 250, 0.9)),
    #fff;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.9),
    inset 0 -1px 0 rgba(0, 0, 0, 0.04),
    inset 0 0 0 1px rgba(0, 0, 0, 0.045);
  overflow: hidden;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  transform: rotateY(0deg) translateZ(0.6px);
  -webkit-transform: rotateY(0deg) translateZ(0.6px);
  transform-style: preserve-3d;
  -webkit-transform-style: preserve-3d;
}

.stamp-face::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(120deg, rgba(255, 255, 255, 0.42), transparent 42%),
    repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.018) 0 1px, transparent 1px 5px);
  pointer-events: none;
}

.card-front {
  grid-template-rows: auto 1fr auto auto;
  transform: rotateY(180deg) translateZ(0.6px);
  -webkit-transform: rotateY(180deg) translateZ(0.6px);
}

.card-top,
.card-bottom,
.grid,
.symbol-grid,
.answer-copy {
  position: relative;
  z-index: 2;
}

.card-top,
.card-bottom {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: var(--card-muted);
  font-family: var(--mono);
  font-size: 10px;
  line-height: 1;
}

.card-title,
.card-id,
.card-choice-label,
.card-date {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-title {
  max-width: 112px;
}

.card-date {
  flex: 0 0 auto;
}

.card-choice-label {
  max-width: 112px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  width: min(100%, 184px);
  gap: 4px;
  align-self: center;
  justify-self: center;
}

.cell {
  aspect-ratio: 1;
  border-radius: 3px;
  background: var(--card-cell);
}

.cell.is-on {
  background: var(--card-mark);
}

.symbol-grid {
  position: relative;
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  grid-template-rows: repeat(10, 1fr);
  width: 104px;
  aspect-ratio: 1;
  gap: 4px;
  align-self: center;
  justify-self: center;
  transform: rotate(-6deg);
}

.symbol-cell {
  grid-column: var(--column);
  grid-row: var(--row);
  border-radius: 4px;
  background: var(--card-mark);
}

.answer-copy {
  align-self: center;
  display: grid;
  gap: 8px;
  text-align: center;
}

.option-label {
  color: var(--card-muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0;
  text-transform: uppercase;
}

.option-text,
.answer-text {
  margin: 0;
  color: #666;
  font-size: 20px;
  font-weight: 680;
  line-height: 1.05;
  letter-spacing: 0;
  min-height: 2.1em;
  display: grid;
  place-items: center;
  overflow-wrap: anywhere;
}

.control-panel {
  width: min(100%, 390px);
  margin: -4px auto 0;
  display: grid;
}

.field {
  display: grid;
  gap: 12px;
}

.field label {
  color: #9a9a9a;
  font-size: 15px;
  font-weight: 760;
  line-height: 1.1;
  letter-spacing: 0;
}

.decision-row {
  position: relative;
}

.field input {
  width: 100%;
  min-width: 0;
  min-height: 70px;
  border: 1px solid #dedede;
  border-radius: 22px;
  background: rgba(255, 255, 255, 0.88);
  color: #252525;
  padding: 0 110px 0 20px;
  font-size: 18px;
  font-weight: 760;
  line-height: 1.2;
  letter-spacing: 0;
  box-shadow:
    0 0 0 4px rgba(23, 23, 23, 0.035),
    inset 0 0 0 1px rgba(23, 23, 23, 0.04);
}

.field input::placeholder {
  color: #8f8f8f;
  opacity: 1;
}

#buildButton {
  position: absolute;
  top: 50%;
  right: 8px;
  width: auto;
  min-width: 90px;
  max-width: calc(100% - 16px);
  min-height: 48px;
  display: grid;
  place-items: center;
  overflow: hidden;
  border-color: rgba(23, 23, 23, 0.88);
  border-radius: 999px;
  transform: translateY(-50%);
  background:
    radial-gradient(circle at 34% 22%, rgba(255, 255, 255, 0.2), transparent 32%),
    linear-gradient(180deg, #272727, #0f0f0f);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.22),
    inset 0 -10px 18px rgba(0, 0, 0, 0.42),
    0 13px 24px rgba(0, 0, 0, 0.2);
  padding: 0 18px;
}

#buildButton:hover {
  transform: translateY(calc(-50% - 2px)) scale(1.015);
}

#buildButton:active {
  transform: translateY(-50%) scale(0.98);
}

#buildButton.is-building {
  animation: draw-pulse 620ms ease-in-out infinite;
}

#buildButton:disabled {
  cursor: wait;
  opacity: 1;
}

.button-text {
  position: relative;
  z-index: 1;
  color: #fff;
  font-size: 15px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: 0;
  white-space: nowrap;
}

.source-footer {
  display: grid;
  justify-items: center;
  margin-top: clamp(88px, 15vh, 144px);
}

.source-link {
  color: #c3c3c3;
  font-size: 11px;
  font-weight: 400;
  line-height: 1;
  letter-spacing: 0;
  text-decoration: none;
  text-underline-offset: 4px;
  transition: color 160ms ease, opacity 160ms ease;
}

.source-link:hover {
  color: #8a8a8a;
  text-decoration: underline;
}

.source-link:focus-visible {
  outline: 0;
  color: #767676;
  text-decoration: underline;
}

@keyframes draw-pulse {
  0%,
  100% {
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.22),
      inset 0 -10px 18px rgba(0, 0, 0, 0.42),
      0 12px 24px rgba(0, 0, 0, 0.16);
  }

  50% {
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.3),
      inset 0 -10px 18px rgba(0, 0, 0, 0.36),
      0 14px 30px rgba(0, 0, 0, 0.22);
  }
}

.empty {
  position: absolute;
  inset: 0;

  place-items: center;

  letter-spacing: 0;

  <script>
/*
[INPUT]: 依赖浏览器 Web Audio API 和 app.js 传入的抽卡、发牌、翻牌事件
[OUTPUT]: 对外提供 window.TodayCardAudio.playDrawStart、playDealCard、playFlipReveal 三个 8-bit 声音入口
[POS]: 项目声音层，只合成抽卡仪式音效，不拥有卡片数据、DOM 结构和视觉状态
[PROTOCOL]: 变更时更新此头部，然后检查 CLAUDE.md
*/
(function () {
  const MASTER = 0.34;
  const PITCH = 1.5;
  const HERO_NOTES = [261.63, 329.63, 392, 523.25];

  let audioContext;

  function getContext() {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) return undefined;
    if (!audioContext) audioContext = new AudioContextClass();
    if (audioContext.state === 'suspended') {
      void audioContext.resume();
    }
    return audioContext;
  }

  function cleanup(source, nodes) {
    source.addEventListener('ended', () => {
      nodes.forEach((node) => {
        try {
          node.disconnect();
        } catch {
          /* 浏览器可能已经回收节点连接。 */
        }
      });
    }, { once: true });
  }

  function connectThroughGain(ctx, source, start, duration, volume) {
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.001, start);
    gain.gain.linearRampToValueAtTime(volume, start + 0.006);
    gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
    source.connect(gain);
    gain.connect(ctx.destination);
    return gain;
  }

  function playTone(ctx, start, frequency, duration, volume, type) {
    const oscillator = ctx.createOscillator();
    const gain = connectThroughGain(ctx, oscillator, start, duration, volume);
    oscillator.type = type || 'square';
    oscillator.frequency.setValueAtTime(frequency * PITCH, start);
    oscillator.start(start);
    oscillator.stop(start + duration + 0.04);
    cleanup(oscillator, [oscillator, gain]);
  }

  function playSweep(ctx, start, from, to, duration, volume) {
    const oscillator = ctx.createOscillator();
    const gain = connectThroughGain(ctx, oscillator, start, duration, volume);
    oscillator.type = 'square';
    oscillator.frequency.setValueAtTime(from * PITCH, start);
    oscillator.frequency.exponentialRampToValueAtTime(to * PITCH, start + duration);
    oscillator.start(start);
    oscillator.stop(start + duration + 0.04);
    cleanup(oscillator, [oscillator, gain]);
  }

  function playNoise(ctx, start, duration, volume, frequency, q) {
    const buffer = ctx.createBuffer(1, Math.max(1, Math.floor(ctx.sampleRate * duration)), ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i += 1) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (data.length * 0.18));
    }

    const source = ctx.createBufferSource();
    const filter = ctx.createBiquadFilter();
    const gain = ctx.createGain();

    source.buffer = buffer;
    filter.type = 'bandpass';
    filter.frequency.value = frequency;
    filter.Q.value = q;
    gain.gain.value = volume;

    source.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    source.start(start);
    cleanup(source, [source, filter, gain]);
  }

  function playArpeggio(ctx, start, notes, gap, duration, volume) {
    notes.forEach((frequency, index) => {
      const hold = index === notes.length - 1 ? duration * 1.7 : duration;
      playTone(ctx, start + index * gap, frequency, hold, volume, 'square');
    });
  }

  function playDrawStart() {
    const ctx = getContext();
    if (!ctx) return;
    const start = ctx.currentTime + 0.006;
    playNoise(ctx, start, 0.018, MASTER * 0.34, 2200, 2.8);
    playSweep(ctx, start + 0.01, 130.81, 392, 0.18, MASTER * 0.18);
    playArpeggio(ctx, start + 0.035, [196, 246.94, 329.63], 0.055, 0.1, MASTER * 0.18);
  }

  function playDealCard(detail) {
    const ctx = getContext();
    if (!ctx) return;
    const index = Number(detail && detail.index) || 0;
    const start = ctx.currentTime + 0.004;
    const pitch = [523.25, 587.33, 659.25, 783.99][index % 4];
    playNoise(ctx, start, 0.024, MASTER * 0.28, 1700 + index * 420, 3.4);
    playTone(ctx, start + 0.012, pitch, 0.055, MASTER * 0.12, 'square');
  }

  function playFlipReveal() {
    const ctx = getContext();
    if (!ctx) return;
    const start = ctx.currentTime + 0.006;
    playNoise(ctx, start, 0.012, MASTER * 0.25, 3600, 2);
    playSweep(ctx, start, 196, 392, 0.16, MASTER * 0.16);
    playArpeggio(ctx, start + 0.04, HERO_NOTES, 0.064, 0.12, MASTER * 0.28);
    playArpeggio(ctx, start + 0.23, [1046.5, 1318.51], 0.045, 0.08, MASTER * 0.14);
  }

  window.TodayCardAudio = {
    playDrawStart,
    playDealCard,
    playFlipReveal
  };
}());

    mixed ^= mixed + Math.imul(mixed ^ (mixed >>> 7), mixed | 61);

  return decision
    .replace(/[?？。！!]/g, '')
    .replace(/^今天(要不要|想不想|想)?/, '')
    .replace(/^(推进|推动|做|开始|去|试试)/, '')
    .trim();
}

function optionSuggestions(decision) {
  const clean = decision.trim() || '这件事';
  if (clean === t('fallbackDecision')) return t('defaultOptions').slice(0, AUTO_OPTION_COUNT);
  if (localeKey === 'en') {
    const object = clean.replace(/[?？。！!]/g, '').slice(0, 28) || t('fallbackDecision');
    return [
      `Move ${object} forward now`,
      'Pause for now',
      'Ask one person first',
      'Try it for 30 minutes'
    ].slice(0, AUTO_OPTION_COUNT);
  }
  const object = decisionObject(clean).slice(0, 18) || '这件事';
  return [
    `现在推进${object}`,
    `暂时不做`,
    `问一个人再定`,
    `只试 30 分钟`
  ].slice(0, AUTO_OPTION_COUNT);
}

async function fetchGeneratedOptions(decision) {
  const response = await fetch('/api/cards', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: decision })
  });
  if (!response.ok) throw new Error('Dify answers failed');
  const data = await response.json();
  return normalizeAnswerList(Array.isArray(data.answers) ? data.answers : []);
}

async function optionsFor(decision) {
  try {
    const generated = await fetchGeneratedOptions(decision);
    if (generated.length) return generated;
  } catch {
    /* Dify is optional; local suggestions keep the card ritual usable. */
  }
  return optionSuggestions(decision);
}

function cardSeed(decision, option, index) {
  return hashString(`${decision}\n${option}\n${index + 1}`);
}

function shuffledIndexes(count, rng) {
  const indexes = Array.from({ length: count }, (_, index) => index);
  for (let index = indexes.length - 1; index > 0; index -= 1) {
    const swapIndex = Math.floor(rng() * (index + 1));
    [indexes[index], indexes[swapIndex]] = [indexes[swapIndex], indexes[index]];
  }
  return indexes;
}

function uniquePaletteIndexes(decision, count) {
  const rng = createRng(hashString(`${decision}\npalette-deck`));
  const groups = new Map();
  PALETTES.forEach((palette, index) => {
    const family = palette.family || palette.name;
    if (!groups.has(family)) groups.set(family, []);
    groups.get(family).push(index);
  });
  const families = [...groups.keys()];
  const familyOrder = shuffledIndexes(families.length, rng);
  return Array.from({ length: count }, (_, index) => {
    const family = families[familyOrder[index % familyOrder.length]];
    const members = groups.get(family);
    return members[Math.floor(rng() * members.length)];
  });
}

function currentDateStamp() {
  const now = new Date();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${month}/${day}`;
}

function createCards(decision, options) {
  const date = currentDateStamp();
  const paletteIndexes = uniquePaletteIndexes(decision, options.length);
  return options.map((option, index) => {
    const seed = cardSeed(decision, option, index);
    return {
      id: `TC.${String((seed % 100000)).padStart(5, '0')}`,
      index,
      option,
      choiceLabel: OPTION_LABELS[index] || `Choice ${index + 1}`,
      date,
      seed,
      paletteIndex: paletteIndexes[index],
      grid: createGrid(createRng(seed ^ 0x9E3779B9))
    };
  });
}

/* ------------------------------
   图案层: 10x10 预设, seed 只负责选择
------------------------------ */
function parsePreset(rows) {
  return rows.map((row) => [...row].map((cell) => cell === '#'));
}

function flipGridX(grid) {
  return grid.map((row) => [...row].reverse());
}

function createGrid(rng) {
  let grid = parsePreset(GRID_PRESETS[Math.floor(rng() * GRID_PRESETS.length)].rows);
  if (rng() > 0.5) grid = flipGridX(grid);
  return grid;
}

/* ------------------------------
   视图层: 牌堆只展示状态
------------------------------ */
function paletteFor(card) {
  return PALETTES[(card.paletteIndex + state.paletteShift) % PALETTES.length];
}

function setCardPalette(node, palette) {
  node.style.setProperty('--card-bg', palette.bg);
  node.style.setProperty('--card-cell', palette.cell);
  node.style.setProperty('--card-mark', palette.mark);
  node.style.setProperty('--card-text', palette.text);
  node.style.setProperty('--card-muted', palette.muted);
  node.style.setProperty('--card-frame', palette.frame);
}

function gridHtml(grid) {
  return grid
    .flat()
    .map((on) => `<span class="cell${on ? ' is-on' : ''}"></span>`)
    .join('');
}

function solidSymbolHtml(grid) {
  return grid
    .map((row, rowIndex) => row
      .map((on, columnIndex) => {
        if (!on) return '';
        return `<span class="symbol-cell" style="--row:${rowIndex + 1};--column:${columnIndex + 1};"></span>`;
      })
      .join(''))
    .join('');
}

function cardHtml(card) {
  const flipped = state.revealed.has(card.index);
  const answerSymbol = solidSymbolHtml(card.grid);
  return `
    <article class="card${flipped ? ' is-flipped' : ''}" data-index="${card.index}" aria-label="TodayCard ${card.index + 1}">
      <div class="deal-motion">
        <div class="card-inner">
          <div class="stamp-face card-back">
            <div class="card-top">
              <span class="card-title">${CARD_BRAND}</span>
              <span class="card-id">${card.id}</span>
            </div>
            <div class="grid" aria-hidden="true">${gridHtml(card.grid)}</div>
            <div class="card-bottom">
              <span class="card-choice-label">${escapeHtml(card.choiceLabel)}</span>
              <span class="card-date">${card.date}</span>
            </div>
          </div>
          <div class="stamp-face card-front">
            <div class="card-top">
              <span class="card-title">${CARD_BRAND}</span>
              <span class="card-id">${card.id}</span>
            </div>
            <div class="symbol-grid" aria-hidden="true">${answerSymbol}</div>
            <div class="answer-copy">
              <span class="option-label">${escapeHtml(t('answerLabel'))}</span>
              <p class="answer-text">${escapeHtml(card.option)}</p>
            </div>
            <div class="card-bottom">
              <span class="card-choice-label">${escapeHtml(card.choiceLabel)}</span>
              <span class="card-date">${card.date}</span>
            </div>
          </div>
        </div>
      </div>
    </article>
  `;
}

function clearDealTimers() {
  state.dealTimers.forEach((timer) => window.clearTimeout(timer));
  state.dealTimers = [];
  state.isDealing = false;
  els.deckShell.classList.remove('is-dealing');
}

function markDealingCard(node) {
  const index = Number(node.dataset.index);
  node.classList.add('is-dealing');
  node.style.setProperty('--deal-delay', `${index * DEAL_STAGGER_MS}ms`);
  node.addEventListener('animationend', () => {
    node.classList.remove('is-dealing');
  }, { once: true });
}

function escapeHtml(value) {
  return String(value)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function renderCards(options = {}) {
  els.deck.innerHTML = state.cards.map(cardHtml).join('');
  els.emptyState.hidden = state.cards.length > 0;
  const cardNodes = [...els.deck.querySelectorAll('.card')];
  cardNodes.forEach((node) => {
    const card = state.cards[Number(node.dataset.index)];
    setCardPalette(node, paletteFor(card));
  });
  layoutCards();
  if (options.deal) cardNodes.forEach(markDealingCard);
}

function layoutCards() {
  const shellWidth = els.deckShell.clientWidth || window.innerWidth;
  const dragOffset = state.drag.active ? state.drag.deltaX / 118 : 0;
  const compactSpread = clamp(shellWidth * 0.34, 112, 150);
  const spread = shellWidth < 520 ? compactSpread : 250;
  const yaw = shellWidth < 520 ? -24 : -30;
  els.deck.querySelectorAll('.card').forEach((node) => {
    const index = Number(node.dataset.index);
    const offset = index - state.focus + dragOffset;
    const distance = Math.abs(offset);
    node.classList.toggle('is-focused', distance < 0.5);
    node.style.setProperty('--x', `${offset * spread}px`);
    node.style.setProperty('--z', `${distance === 0 ? 60 : -distance * 48}px`);
    node.style.setProperty('--ry', `${offset * yaw}deg`);
    node.style.setProperty('--rz', `${offset * 1.4}deg`);
    node.style.setProperty('--scale', `${Math.max(0.68, 1 - distance * 0.1)}`);
    node.style.setProperty('--opacity', `${distance > 3 ? 0.18 : Math.max(0.32, 1 - distance * 0.15)}`);
    node.style.setProperty('--sat', `${distance < 0.5 ? 1 : 0.68}`);
    node.style.zIndex = String(100 - Math.round(distance * 10));
  });
}

function setBuilding(isBuilding) {
  els.buildButton.disabled = isBuilding;
  els.buildButton.classList.toggle('is-building', isBuilding);
  els.buildButton.setAttribute('aria-busy', String(isBuilding));
  els.buildButton.setAttribute('aria-label', isBuilding ? t('buildingButton') : t('drawButton'));
  if (els.buildText) els.buildText.textContent = isBuilding ? t('buildingButton') : t('drawButton');
}

function finishDeal(requestId) {
  if (requestId !== state.requestId) return;
  state.dealTimers = [];
  state.isDealing = false;
  els.deckShell.classList.remove('is-dealing');
  setBuilding(false);
}

function startDealSequence(requestId) {
  clearDealTimers();
  state.isDealing = true;
  els.deckShell.classList.add('is-dealing');
  renderCards({ deal: true });

  state.cards.forEach((card) => {
    const timer = window.setTimeout(() => {
      if (requestId === state.requestId) playSound('playDealCard', { index: card.index });
    }, card.index * DEAL_STAGGER_MS);
    state.dealTimers.push(timer);
  });

  const total = Math.max(0, state.cards.length - 1) * DEAL_STAGGER_MS + DEAL_SETTLE_MS;
  state.dealTimers.push(window.setTimeout(() => finishDeal(requestId), total));
}

async function rebuild() {
  if (els.buildButton.disabled) return;
  const decision = currentDecision();
  const requestId = state.requestId + 1;
  state.requestId = requestId;
  clearDealTimers();
  setBuilding(true);
  playSound('playDrawStart');
  let didStartDeal = false;
  try {
    const options = await optionsFor(decision);
    if (requestId !== state.requestId) return;
    state.decision = decision;
    state.cards = createCards(decision, options);
    state.focus = 0;
    state.revealed = new Set();
    startDealSequence(requestId);
    didStartDeal = true;
  } finally {
    if (requestId === state.requestId && !didStartDeal) setBuilding(false);
  }
}

function renderLocalDeck() {
  const decision = currentDecision();
  const options = optionSuggestions(decision);
  state.decision = decision;
  state.cards = createCards(decision, options);
  state.focus = 0;
  state.revealed = new Set();
  renderCards();
}

function focusCard(index, feedback = 'select') {
  if (!state.cards.length || state.isDealing) return;
  const next = clamp(index, 0, state.cards.length - 1);
  if (next === state.focus) return;
  state.focus = next;
  layoutCards();
  haptic(feedback);
}

function moveFocus(delta, feedback = 'select') {
  focusCard(state.focus + delta, feedback);
}

function flipFocused() {
  if (state.isDealing) return;
  const current = state.cards[state.focus];
  if (!current) return;
  flipCard(current.index);
}

function activateCard(index) {
  if (state.isDealing) return;
  if (index !== state.focus) {
    focusCard(index, 'select');
    return;
  }
  flipCard(index);
}

function activateByPosition(clientX) {
  const current = els.deck.querySelector(`.card[data-index="${state.focus}"]`);
  if (!current) return;
  const rect = current.getBoundingClientRect();
  if (clientX < rect.left) {
    moveFocus(-1, 'select');
    return;
  }
  if (clientX > rect.right) {
    moveFocus(1, 'select');
    return;
  }
  flipFocused();
}

function flipCard(index) {
  const card = state.cards[index];
  if (!card || state.isDealing || state.revealed.has(index)) return;
  state.revealed.add(index);
  haptic('flip');
  playSound('playFlipReveal');
  const node = els.deck.querySelector(`.card[data-index="${index}"]`);
  if (node) {
    node.classList.add('is-flipped');
  }
}

function onPointerDown(event) {
  if (state.isDealing) return;
  if (event.cancelable) event.preventDefault();
  const cardNode = event.target.closest('.card');
  state.drag.active = true;
  state.drag.startX = event.clientX;
  state.drag.deltaX = 0;
  state.drag.moved = false;
  state.drag.cardIndex = cardNode ? Number(cardNode.dataset.index) : null;
  els.deckShell.focus({ preventScroll: true });
  els.deckShell.classList.add('is-dragging');
  els.deckShell.setPointerCapture(event.pointerId);
}

function onPointerMove(event) {
  if (!state.drag.active) return;
  if (event.cancelable) event.preventDefault();
  state.drag.deltaX = event.clientX - state.drag.startX;
  state.drag.moved = Math.abs(state.drag.deltaX) > TAP_MOVE_TOLERANCE_PX;
  if (!state.drag.frame) {
    state.drag.frame = requestAnimationFrame(() => {
      state.drag.frame = 0;
      layoutCards();
    });
  }
}

function onPointerUp(event) {
  if (!state.drag.active) return;
  const deltaX = state.drag.deltaX;
  const isSwipe = Math.abs(deltaX) >= SWIPE_THRESHOLD_PX;
  const steps = Math.sign(-deltaX) * Math.max(1, Math.round(Math.abs(deltaX) / 118));
  const wasCancelled = event.type === 'pointercancel';
  state.drag.active = false;
  if (state.drag.frame) {
    cancelAnimationFrame(state.drag.frame);
    state.drag.frame = 0;
  }
  els.deckShell.classList.remove('is-dragging');
  try {
    els.deckShell.releasePointerCapture(event.pointerId);
  } catch {
    /* releasePointerCapture can already be cleared by the browser */
  }
  if (!wasCancelled) {
    if (isSwipe) {
      moveFocus(steps, 'swipe');
    } else if (state.drag.cardIndex === null) {
      activateByPosition(event.clientX);
    } else {
      activateCard(state.drag.cardIndex);
    }
  }
  state.drag.deltaX = 0;
  state.drag.cardIndex = null;
  layoutCards();
}

function onWheel(event) {
  if (Math.abs(event.deltaX) + Math.abs(event.deltaY) < 20) return;
  event.preventDefault();
  moveFocus(event.deltaX + event.deltaY > 0 ? 1 : -1);
}

function onKeyDown(event) {
  if (!['ArrowRight', 'ArrowLeft', 'Enter', ' '].includes(event.key)) return;
  event.preventDefault();
  if (event.key === 'ArrowRight') moveFocus(1);
  if (event.key === 'ArrowLeft') moveFocus(-1);
  if (event.key === 'Enter' || event.key === ' ') flipFocused();
}

els.buildButton.addEventListener('click', rebuild);
els.deckShell.addEventListener('pointerdown', onPointerDown);
els.deckShell.addEventListener('pointermove', onPointerMove);
els.deckShell.addEventListener('pointerup', onPointerUp);
els.deckShell.addEventListener('pointercancel', onPointerUp);
els.deckShell.addEventListener('wheel', onWheel, { passive: false });
els.deckShell.addEventListener('keydown', onKeyDown);
els.decisionInput.addEventListener('keydown', (event) => {
  if (event.key === 'Enter') rebuild();
});
window.addEventListener('resize', layoutCards);

applyI18n();
renderLocalDeck();
  </script>
</body>
</html>
